<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Care for me</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Lato:wght@100&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="css/style.css" />
  </head>
  <body>
    <div class="login-div">
      <div class="logo">
        <img src="img/cuidameLogo.png" alt="logo de la app" />
      </div>
      <div class="title">Care for me</div>
      <div class="sub-title">me siento seguro</div>
      <div class="fields">
        <form action="">
          <div class="username">
            <input
              type="email"
              class="user-input"
              placeholder="email"
              required
            />
          </div>
          <div class="password">
            <input
              type="password"
              class="pass-input"
              placeholder="password"
              required
            />
          </div>
          <input type="submit" value="Iniciar sesión" class="signin-button" />
        </form>
        <div class="link">
          <a href="recover.html">Restaurar cuenta</a>
        </div>
      </div>
    </div>
  </body>
</html>
