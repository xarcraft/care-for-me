<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Cuidame</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Lato:wght@100&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="css/style.css" />
  </head>
  <body>
    <div class="login-div">
      <div class="logo">
        <img src="img/cuidameLogo.png" alt="" />
      </div>
      <div class="title">Cuidame</div>
      <div class="sub-title">me siento seguro</div>
      <div class="fields__recover">
        <p class="mensaje">
          Si olvidaste tu password por favor digita a continuación el correo con
          el que te registraste para enviarte el vinculo de recuperación del
          mismo.
        </p>
        <form action="">
          <div class="username">
            <input
              type="email"
              class="user-input"
              placeholder="correo electronico"
              required
            />
          </div>
          <input
            type="submit"
            value="Restaurar"
            aria-required="true"
            class="signin-button"
          />
        </form>
        <div class="link">
          <a href="index.html">Volver</a>
        </div>
      </div>
    </div>
  </body>
</html>
